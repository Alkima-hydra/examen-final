name: Deploy Web to S3

# Se dispara al hacer push a main cuando cambia algo en app/
on:
  push:
    branches:
      - main
    paths:
      - "app/**"

jobs:
  deploy-web:
    name: Sync app/ a S3
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar credenciales AWS desde los secrets del repo
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Sincronizar app/ con el bucket S3 (excluye Dockerfile y .dockerignore)
      - name: Deploy a S3
        run: |
          aws s3 sync app/ s3://${{ secrets.S3_BUCKET_WEB }}/ \
            --exclude "Dockerfile" \
            --exclude ".dockerignore" \
            --exclude "*.md" \
            --delete

      # 4. Confirmar la URL del sitio
      - name: URL del sitio
        run: |
          echo "✅ Web publicada en:"
          echo "http://${{ secrets.S3_BUCKET_WEB }}.s3-website-us-east-1.amazonaws.com"
